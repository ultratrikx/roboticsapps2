name: Daily Database Export

on:
  schedule:
    # Runs once every 24 hours at 6:00 AM UTC (1:00 AM Eastern)
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run database export
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/export-database.mjs

      - name: Upload CSV exports as artifact
        uses: actions/upload-artifact@v4
        with:
          name: database-export-${{ github.run_id }}
          path: exports/
          retention-days: 90
